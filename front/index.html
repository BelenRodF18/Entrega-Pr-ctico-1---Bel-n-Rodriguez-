<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dist/css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="dist/js/script.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top py-3">
        <div class="container">
            <a id="marca-nav" class="navbar-brand fw-bold" href="#" style="color: #2b6cb0;">Biblio<span class="text-dark">Digital</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link active px-3" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#catalogo">Catálogo</a></li>
                    <li class="nav-item ms-lg-2"><a id="btn-ingresar" class="btn px-4 round-btn m-1" href="dist/paginas/login.html" style="color: #2b6cb0; border: 1px solid #2b6cb0;">Ingresar</a></li>
                    <li class="nav-item"><a id="btn-registrarse" class="btn px-4 text-white round-btn m-1" href="dist/paginas/registro.html" style="background-color: #2b6cb0;">Registrarse</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section bg-light py-5">
        <div class="container py-4">
            <div class="row align-items-center g-5">
                <div class="col-lg-6">
                    <h1 class="display-4 fw-bold lh-sm mb-3 text-dark">Tu biblioteca digital.</h1>
                    <p class="lead text-muted mb-4">Accede a miles de libros, revistas y audiolibros desde cualquier dispositivo.</p>
                    <div class="d-flex flex-wrap gap-3">
                        <a id="btn-explorar" href="#catalogo" class="btn btn-lg text-white px-4 py-3 shadow-sm" style="background-color: #2b6cb0;">Explorar catálogo</a>
                    </div>
                </div>
                <div class="col-lg-6 text-center">
                    <img src="dist/assets/heroimg.jpg" alt="Ilustración Biblioteca" class="img-fluid rounded-4 shadow-lg" style="max-height: 380px; width: 100%; object-fit: cover;">
                </div>
            </div>
        </div>
    </header>

    <section id="catalogo" class="py-5">
        <div class="container py-4">
            <div class="text-center max-w-xl mx-auto mb-5">
                <h2 class="fw-bold text-dark mb-2">Nuestro catálogo</h2>
                <p class="text-muted">Explora por categoría.</p>
                
                <div class="d-flex justify-content-center gap-2 mt-4 flex-wrap">
                    <button class="btn btn-sm btn-outline-secondary px-3 rounded-pill" onclick="filtrar('todos')">Todos</button>
                    <button class="btn btn-sm btn-outline-secondary px-3 rounded-pill" onclick="filtrar('libros')">Libros</button>
                    <button class="btn btn-sm btn-outline-secondary px-3 rounded-pill" onclick="filtrar('revistas')">Revistas</button>
                    <button class="btn btn-sm btn-outline-secondary px-3 rounded-pill" onclick="filtrar('audiolibros')">Audiolibros</button>
                </div>
            </div>

            <div id="contenedor-catalogo" class="row g-4 row-cols-1 row-cols-md-2 row-cols-lg-3"></div>
            
        </div>
    </section>

    <footer class="bg-white border-top py-4 mt-5">
        <div class="container text-center">
            <p class="text-muted small mb-0">&copy; BiblioDigital. Plataforma de lectura virtual.</p>
        </div>
    </footer>
</body>
</html>
