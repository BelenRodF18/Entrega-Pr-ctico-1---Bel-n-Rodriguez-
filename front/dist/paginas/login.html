<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="../js/script.js"></script>
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card border-0 shadow-sm p-4 p-md-5 bg-white rounded-4" style="max-width: 450px; width: 100%;">
            
            <div class="text-center mb-4">
                <a href="../../index.html" class="text-decoration-none small text-secondary d-block mb-2">← Volver al inicio</a>
                <h2 class="fw-bold text-primary">Biblio<span class="text-dark">Digital</span></h2>
                <p class="text-muted small">Accede a tu cuenta</p>
            </div>

            <form id="formLogin" onsubmit="return validarLogin()" novalidate>
                <div class="mb-3">
                    <label for="loginEmail" class="form-label text-dark fw-medium small">Correo electrónico</label>
                    <input type="email" class="form-control" id="loginEmail" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="mb-3">
                    <label for="loginPassword" class="form-label text-dark fw-medium small">Contraseña</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Ingresa tu contraseña" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 text-white fw-medium mt-2">Iniciar sesión</button>
            </form>

            <div class="text-center mt-4 pt-3 border-top">
                <p class="small text-secondary mb-0">
                    ¿No tienes una cuenta?<br>
                    <a href="registro.html" class="text-primary fw-medium text-decoration-none">Crea una cuenta aquí</a>
                </p>
            </div>

        </div>
    </div>
</body>
</html>
